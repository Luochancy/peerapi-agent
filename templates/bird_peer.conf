protocol bgp {{ .SessionName }} from dnpeers {
    direct;
    neighbor {{ .InterfaceAddr }}%'{{ .Interface }}' as {{ .ASN }};
    {{- if .SourceAddress }}
    source address {{ .SourceAddress }};
    {{- end }}
    {{- if .ExtendedNextHopOn }}
    ipv4 {
        extended next hop on;
    };
    ipv6 {
        extended next hop on;
    };
    {{- end }}
};
