name: Build and Release Go Binaries

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [386, amd64, arm64]
        exclude:
          - goarch: 386
            goos: darwin
          - goarch: arm64
            goos: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24

      - name: Run go get in src
        working-directory: ./src
        run: go get

      - name: Build binaries
        working-directory: ./src
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o peerapi-agent_${{ matrix.goos }}_${{ matrix.goarch }}

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: peerapi-agent_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ./src/peerapi-agent_${{ matrix.goos }}_${{ matrix.goarch }}

  release:
    needs: compile
    name: Release to GitHub
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.release_tag }}" ]; then
              echo "tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
            else
              echo "tag=manual-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
            fi
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "tag=auto-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -exec mv {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: release/*